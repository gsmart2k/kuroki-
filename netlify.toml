[build]
  publish = "dist"
  command = "npm run build"
  functions = "netlify/functions"

# Forward /api/* to /.netlify/functions/* so the frontend fetch() calls work unchanged
[[redirects]]
  from = "/api/:func"
  to = "/.netlify/functions/:func"
  status = 200

# SPA fallback — all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
